<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Money Watcher</title>
  
  <!-- React & ReactDOM (via CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for compiling JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f4f0;
      --bg-tertiary: #f0ede8;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b66;
      --border: rgba(0,0,0,0.10);
      --border-md: rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 14px;
      --credit: #1D9E75;
      --debit: #D85A30;
      --primary: #378ADD;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1e;
        --bg-secondary: #2a2a28;
        --bg-tertiary: #141412;
        --text-primary: #f0ede8;
        --text-secondary: #888780;
        --border: rgba(255,255,255,0.10);
        --border-md: rgba(255,255,255,0.18);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    /* Header */
    .header { margin-bottom: 1.75rem; }
    .header h1 { font-size: 24px; font-weight: 600; color: var(--text-primary); }
    .header p  { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

    /* Filters */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .filters input, .filters select {
      padding: 8px 12px;
      border: 1px solid var(--border-md);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }
    .filters input:focus, .filters select:focus {
      border-color: var(--primary);
    }
    .filters .btn-clear {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--text-primary);
      font-size: 13px;
    }
    .filters .btn-clear:hover { background: var(--bg-tertiary); }

    /* Summary cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }
    .card-value { font-size: 26px; font-weight: 600; }
    .card-value.debit  { color: var(--debit); }
    .card-value.credit { color: var(--credit); }
    .card-value.neutral{ color: var(--text-primary); }

    /* Charts row */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1.7fr;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) {
      .charts-row { grid-template-columns: 1fr; }
      .cards { grid-template-columns: repeat(3, 1fr); }
    }

    .panel {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
    }
    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 14px;
    }

    /* Legend */
    .legend { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .leg-row { display: flex; align-items: center; gap: 9px; font-size: 12px; color: var(--text-secondary); }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .leg-name { flex: 1; text-transform: capitalize; }
    .leg-amt { font-weight: 600; color: var(--text-primary); font-size: 13px; }

    /* Transaction list */
    .txn-panel {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
    }
    .txn-row {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .txn-row:last-child { border-bottom: none; }
    .txn-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .txn-info { flex: 1; min-width: 0; }
    .txn-name {
      font-size: 13px; font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .txn-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; text-transform: capitalize; }
    .txn-amount { font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .txn-amount.d { color: var(--debit); }
    .txn-amount.c { color: var(--credit); }
    
    .loading { text-align: center; padding: 2rem; color: var(--text-secondary); }
    .error { color: var(--debit); padding: 1rem; border: 1px solid var(--debit); border-radius: var(--radius-md); background: rgba(216, 90, 48, 0.1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const API_URL = './public_data.json';

    // Helper functions for chart config
    const isDark = matchMedia && matchMedia('(prefers-color-scheme: dark)').matches;
    const gridColor = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.06)';
    const tickColor = isDark ? '#888' : '#999';
    const bgColor = isDark ? '#1e1e1e' : '#fff';

    const catColors = {
      groceries: '#378ADD',
      food: '#1D9E75',
      pharmacy: '#D85A30',
      services: '#BA7517',
      received: '#639922',
      default: '#888'
    };

    const dynamicPalette = [
      '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEEAD',
      '#D4A5A5', '#9B59B6', '#3498DB', '#E67E22', '#1ABC9C',
      '#F1C40F', '#E74C3C', '#2ECC71', '#95A5A6', '#8E44AD'
    ];

    const getCatColor = (category) => {
      const cat = category.toLowerCase();
      if (catColors[cat] && catColors[cat] !== '#888') {
        return catColors[cat];
      }
      let hash = 0;
      for (let i = 0; i < cat.length; i++) {
        hash = cat.charCodeAt(i) + ((hash << 5) - hash);
      }
      return dynamicPalette[Math.abs(hash) % dynamicPalette.length];
    };

    const iconBg = {
      groceries: '#E6F1FB', food: '#E1F5EE',
      pharmacy: '#FAECE7',  services: '#FAEEDA', received: '#EAF3DE',
      default: '#F0F0F0'
    };

    const catEmoji = {
      groceries: '🛒', food: '🍱', pharmacy: '💊', services: '👤', received: '💰', default: '📝'
    };

    function App() {
      const isDebitTxn = (t) => {
        const i = (t.intent || '').toLowerCase();
        if (i.includes('credit') || i.includes('received')) return false;
        if (i.includes('debit') || i.includes('spend') || i.includes('spent')) return true;
        return true; // Default to debit for unrecognized intents
      };

      const [allTransactions, setAllTransactions] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [filterOptions, setFilterOptions] = useState({ accounts: [], intents: [] });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      // Filters
      const [account, setAccount] = useState('');
      const [counterparty, setCounterparty] = useState('');
      const [intent, setIntent] = useState('');
      const [amountOp, setAmountOp] = useState('gt');
      const [amountVal, setAmountVal] = useState('');

      const donutRef = useRef(null);
      const barRef = useRef(null);
      const donutChartInstance = useRef(null);
      const barChartInstance = useRef(null);

      // Fetch all data once on mount
      useEffect(() => {
        const fetchData = async () => {
          try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            setAllTransactions(data.transactions || []);
            setTransactions(data.transactions || []);
            setFilterOptions(data.filterOptions || { accounts: [], intents: [] });
            setError(null);
          } catch (err) {
            console.error('Failed to fetch data:', err);
            setError('Failed to load data. Ensure public_data.json exists.');
          } finally {
            setLoading(false);
          }
        };
        fetchData();
      }, []);

      // Apply filters client-side
      useEffect(() => {
        let filtered = allTransactions;
        
        if (account) {
          filtered = filtered.filter(t => t.account === account);
        }
        if (counterparty) {
          const cp = counterparty.toLowerCase();
          filtered = filtered.filter(t => t.counterparty && t.counterparty.toLowerCase().includes(cp));
        }
        if (intent) {
          filtered = filtered.filter(t => t.intent === intent);
        }
        if (amountVal && !isNaN(amountVal)) {
          const val = parseFloat(amountVal);
          filtered = filtered.filter(t => {
            const absAmount = Math.abs(t.amount);
            if (amountOp === 'gt') return absAmount > val;
            if (amountOp === 'lt') return absAmount < val;
            if (amountOp === 'eq') return absAmount === val;
            return true;
          });
        }
        
        setTransactions(filtered);
      }, [allTransactions, account, counterparty, intent, amountOp, amountVal]);

      // Calculate summaries
      const totalSpent = transactions.filter(isDebitTxn).reduce((sum, t) => sum + Math.abs(t.amount), 0);
      const totalReceived = transactions.filter(t => !isDebitTxn(t)).reduce((sum, t) => sum + Math.abs(t.amount), 0);
      
      const netValue = Math.abs(totalSpent - totalReceived);
      const netClass = totalReceived > totalSpent ? 'credit' : 'debit';
      const netLabel = totalReceived > totalSpent ? 'Net Inflow' : 'Net Outflow';

      // Prepare Chart Data
      useEffect(() => {
        if (!donutRef.current || !barRef.current) return;

        // 1. Donut Chart Data (Spends by Intent/Category)
        const spendsByIntent = {};
        transactions.filter(isDebitTxn).forEach(t => {
          const cat = t.intent.toLowerCase();
          spendsByIntent[cat] = (spendsByIntent[cat] || 0) + Math.abs(t.amount);
        });
        const donutLabels = Object.keys(spendsByIntent);
        const donutData = donutLabels.map(l => spendsByIntent[l]);
        const donutColors = donutLabels.map(l => getCatColor(l));

        if (donutChartInstance.current) donutChartInstance.current.destroy();
        donutChartInstance.current = new Chart(donutRef.current, {
          type: 'doughnut',
          data: {
            labels: donutLabels,
            datasets: [{
              data: donutData,
              backgroundColor: donutColors,
              borderWidth: 2,
              borderColor: bgColor,
              hoverOffset: 5
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '68%',
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => ` ₹${ctx.raw.toFixed(2)}` } }
            }
          }
        });

        // 2. Bar Chart Data (Daily Cash Flow)
        const spendsByDate = {};
        const receivesByDate = {};
        transactions.forEach(t => {
          const dateStr = new Date(t.txn_date).toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
          if (isDebitTxn(t)) {
            spendsByDate[dateStr] = (spendsByDate[dateStr] || 0) + Math.abs(t.amount);
          } else {
            receivesByDate[dateStr] = (receivesByDate[dateStr] || 0) + Math.abs(t.amount);
          }
        });
        
        // Merge dates and sort
        const allDatesSet = new Set([...Object.keys(spendsByDate), ...Object.keys(receivesByDate)]);
        const sortedDates = Array.from(allDatesSet).sort((a, b) => new Date(a) - new Date(b));
        
        const spendData = sortedDates.map(d => spendsByDate[d] || 0);
        const receiveData = sortedDates.map(d => receivesByDate[d] || 0);

        if (barChartInstance.current) barChartInstance.current.destroy();
        barChartInstance.current = new Chart(barRef.current, {
          type: 'bar',
          data: {
            labels: sortedDates,
            datasets: [
              {
                label: 'Spent',
                data: spendData,
                backgroundColor: '#D85A30',
                borderRadius: 4,
              },
              {
                label: 'Received',
                data: receiveData,
                backgroundColor: '#1D9E75',
                borderRadius: 4,
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position: 'top', labels: { color: tickColor, font: { size: 11 } } },
              tooltip: { callbacks: { label: ctx => ` ₹${ctx.raw.toFixed(2)}` } }
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: { color: tickColor, font: { size: 12 } }
              },
              y: {
                grid: { color: gridColor },
                ticks: { color: tickColor, font: { size: 12 }, callback: v => '₹' + v },
                beginAtZero: true
              }
            }
          }
        });

      }, [transactions]);

      // Handle form reset
      const clearFilters = () => {
        setAccount('');
        setCounterparty('');
        setIntent('');
        setAmountVal('');
        setAmountOp('gt');
      };

      // Helper to render Donut Legend
      const renderLegend = () => {
        const spendsByIntent = {};
        transactions.filter(isDebitTxn).forEach(t => {
          const cat = t.intent.toLowerCase();
          spendsByIntent[cat] = (spendsByIntent[cat] || 0) + Math.abs(t.amount);
        });
        
        return Object.keys(spendsByIntent).map(cat => (
          <div key={cat} className="leg-row">
            <span className="leg-dot" style={{ background: getCatColor(cat) }}></span>
            <span className="leg-name">{cat}</span>
            <span className="leg-amt">₹{spendsByIntent[cat].toFixed(2)}</span>
          </div>
        ));
      };

      const hasActiveFilters = account || counterparty || intent || amountVal;

      return (
        <div className="container">
          <div className="header">
            <h1>Money Watcher</h1>
            <p>Interactive Finance Dashboard</p>
          </div>

          <div className="filters">
            <select value={account} onChange={e => setAccount(e.target.value)}>
              <option value="">All Accounts</option>
              {filterOptions.accounts.map(acc => (
                <option key={acc} value={acc}>{acc}</option>
              ))}
            </select>
            
            <select value={intent} onChange={e => setIntent(e.target.value)}>
              <option value="">All Intents</option>
              {filterOptions.intents.map(int => (
                <option key={int} value={int}>{int}</option>
              ))}
            </select>

            <input 
              type="text" 
              placeholder="Filter by Counterparty..." 
              value={counterparty} 
              onChange={e => setCounterparty(e.target.value)} 
            />

            <div className="filter-group">
              <select value={amountOp} onChange={e => setAmountOp(e.target.value)}>
                <option value="gt">&gt;</option>
                <option value="lt">&lt;</option>
                <option value="eq">=</option>
              </select>
              <input 
                type="number" 
                placeholder="Amount..." 
                value={amountVal} 
                onChange={e => setAmountVal(e.target.value)} 
                style={{ width: '100px' }}
              />
            </div>

            {hasActiveFilters && (
              <button className="btn-clear" onClick={clearFilters}>Clear Filters</button>
            )}
          </div>

          {error && <div className="error">{error}</div>}

          <div className="cards">
            <div className="card">
              <div className="card-label">Total spent</div>
              <div className="card-value debit">₹{totalSpent.toFixed(2)}</div>
            </div>
            <div className="card">
              <div className="card-label">Received</div>
              <div className="card-value credit">₹{totalReceived.toFixed(2)}</div>
            </div>
            <div className="card">
              <div className="card-label">{netLabel}</div>
              <div className={`card-value ${netClass}`}>₹{netValue.toFixed(2)}</div>
            </div>
          </div>

          <div className="charts-row">
            <div className="panel">
              <div className="panel-title">By Intent (Spend)</div>
              <div style={{ position: 'relative', height: '170px' }}>
                <canvas ref={donutRef}></canvas>
              </div>
              <div className="legend">
                {renderLegend()}
              </div>
            </div>

            <div className="panel">
              <div className="panel-title">Daily Cash Flow</div>
              <div style={{ position: 'relative', height: '230px' }}>
                <canvas ref={barRef}></canvas>
              </div>
            </div>
          </div>

          <div className="txn-panel">
            <div className="panel-title">Transactions</div>
            {loading ? (
              <div className="loading">Loading transactions...</div>
            ) : transactions.length === 0 ? (
              <div className="loading">No transactions found matching your filters.</div>
            ) : (
              <div>
                {transactions.map(t => {
                  const dateStr = new Date(t.txn_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
                  const isDebit = isDebitTxn(t);
                  const sign = isDebit ? '−' : '+';
                  const absAmount = Math.abs(t.amount).toFixed(2);
                  const intentKey = t.intent.toLowerCase();
                  
                  return (
                    <div className="txn-row" key={t.id}>
                      <div className="txn-icon" style={{ background: iconBg[intentKey] || iconBg.default }}>
                        {catEmoji[intentKey] || catEmoji.default}
                      </div>
                      <div className="txn-info">
                        <div className="txn-name">{t.counterparty}</div>
                        <div className="txn-meta">{dateStr} &middot; {t.intent} &middot; {t.account}</div>
                      </div>
                      <div className={`txn-amount ${isDebit ? 'd' : 'c'}`}>
                        {sign}₹{absAmount}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
